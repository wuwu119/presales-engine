# 公司能力档案（种子模板）
#
# 用途：/ps:rfp-analyze 对照此文件判断我方是否满足 RFP 要求
# 维护：建议持续累积，每次新投标的变化也更新回这里
# 位置：初始化后复制到 ~/售前/知识库/company-profile.yaml（默认）或用户自选路径

company:
  name_zh: ""
  name_en: ""
  founded: null              # 成立年份（数字）
  size: null                 # 员工规模（数字）
  location: null             # 总部所在地

# 资质清单 — 对应 RFP qualifications
# 每条资质必须有文件证据，否则不能用于投标
qualifications: []
  # 示例：
  # - id: QUAL-001
  #   name: ISO 9001 质量管理体系认证
  #   valid_from: 2024-01-01
  #   valid_until: 2027-12-31
  #   evidence_file: 知识库/资质证书/iso9001.pdf
  # - id: QUAL-002
  #   name: 信息安全管理体系认证 ISO 27001
  #   valid_until: 2026-06-30
  #   evidence_file: 知识库/资质证书/iso27001.pdf

# 案例引用 — 对应 RFP "类似项目经验"要求
case_references: []
  # 示例：
  # - id: CASE-001
  #   customer: XX 银行
  #   industry: 金融
  #   year: 2024
  #   scale: "5000 万"
  #   summary: "为 XX 银行建设核心系统..."
  #   evidence_file: 知识库/归档/xxx-bank.md
  #   contact_reference: true    # 是否可联系甲方作为证明人

# 团队配置
team: []
  # 示例：
  # - role: 项目经理
  #   count: 3
  #   certifications: [PMP, PRINCE2]
  # - role: 高级架构师
  #   count: 5
  #   certifications: [阿里云 ACP, AWS SA-Pro]

# 差异化亮点 — 用于 bid-draft 的卖点生成
# 每条必须是可量化或可验证的事实，禁止空洞口号
highlights: []
  # 示例：
  # - "国内首个通过 ISO 27001 认证的 XX 服务商"
  # - "服务过 30% 的 TOP 100 银行客户"
  # - "平均响应时间 2 小时，99.9% SLA"
