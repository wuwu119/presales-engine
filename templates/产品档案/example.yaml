# 产品 / 服务档案模板
#
# 用途：/ps:bid-draft 读取匹配 RFP 需求的产品能力
# 使用：每个产品一个文件，文件名建议 {product-slug}.yaml
# 位置：复制到 ~/售前/知识库/产品档案/（默认）或用户自选路径

meta:
  slug: example-product
  name: 示例产品
  name_en: Example Product
  category: ""                  # SaaS / 本地部署 / 硬件 / 服务 / 咨询
  status: active                # active / deprecated

capabilities: []
  # 功能点列表，每条必须可验证
  # - name: 用户管理
  #   description: "支持 10 万级用户的 RBAC 权限管理"
  #   since_version: "2.0"

technical:
  architecture: ""              # 微服务 / 单体 / 云原生 / 其他
  deployment: []                # cloud / on-premise / hybrid
  integration: []               # 能对接的外部系统
  programming_languages: []
  databases: []

delivery:
  timeline_days: null           # 标准交付周期（天）
  team_size: null               # 标准团队规模
  methodology: ""               # 敏捷 / 瀑布 / 混合

pricing:
  model: ""                     # 一次性 / 订阅 / 按量 / 混合
  base: null                    # 基础报价
  unit: ""                      # 计价单位（年 / 次 / 用户）

certifications: []
  # 产品级认证证书（区别于 company-profile.yaml 的公司级资质）
  # - name: 网络安全专用产品安全检测证书
  #   issuer: 公安部计算机信息系统安全产品质量监督检验中心
  #   cert_no: ""
  #   valid_until: 2027-06-30
  #   product_type: 防火墙
  #   level: EAL3+

references: []
  # 使用此产品的客户案例引用（指向 company-profile.case_references 的 id）
  # - case_id: CASE-001
